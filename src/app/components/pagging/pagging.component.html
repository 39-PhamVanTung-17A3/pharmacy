<div class="pagination-wrap">
  <span>Hiển thị {{ showingRecords }}/{{ total }} bản ghi</span>
  <nz-pagination
    [nzTotal]="total"
    [nzPageIndex]="pageIndex"
    [nzPageSize]="pageSize"
    [nzSize]="'small'"
    [nzShowSizeChanger]="false"
    (nzPageIndexChange)="onPageIndexChange($event)"
  ></nz-pagination>
</div>
