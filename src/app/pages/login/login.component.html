<div class="login-page">
  <nz-card nzTitle="Đăng nhập hệ thống" class="login-card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <label>Số điện thoại</label>
      <input nz-input formControlName="phone" placeholder="Nhập số điện thoại" />

      <label>Mật khẩu</label>
      <nz-input-group [nzSuffix]="passwordToggleIcon">
        <input nz-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Nhập mật khẩu" />
      </nz-input-group>
      <ng-template #passwordToggleIcon>
        <span nz-icon [nzType]="showPassword ? 'eye-invisible' : 'eye'" (click)="togglePasswordVisibility()"></span>
      </ng-template>

      <button nz-button nzType="primary" [disabled]="loading" [nzLoading]="loading" class="submit-btn">Đăng nhập</button>
    </form>
  </nz-card>
</div>
