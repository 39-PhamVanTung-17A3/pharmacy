<div class="page-wrap">
  <app-menu></app-menu>

  <main class="main-content">
    <header class="page-header">
      <nz-breadcrumb>
        <nz-breadcrumb-item>Trang chủ</nz-breadcrumb-item>
        <nz-breadcrumb-item>Kho thuốc</nz-breadcrumb-item>
      </nz-breadcrumb>
      <button nz-button nzType="primary" (click)="openCreatePopup()">Thêm thuốc mới</button>
    </header>

    <nz-card nzTitle="Danh sách thuốc" [nzExtra]="extraTpl">
      <ng-template #extraTpl>
        <input nz-input [formControl]="filterForm.controls.keyword" placeholder="Tìm kiếm theo tên thuốc, danh mục hoặc đơn vị" />
      </ng-template>

      <nz-table [nzData]="medicineList" [nzShowPagination]="false" nzSize="middle">
        <thead>
          <tr>
            <th>Ảnh</th>
            <th>Tên thuốc</th>
            <th>Danh mục</th>
            <th>Đơn vị</th>
            <th class="text-right">Tổng tồn</th>
            <th class="text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of medicineList">
            <td>
              <img *ngIf="item.imageUrl" [src]="item.imageUrl" alt="Ảnh thuốc" class="medicine-thumbnail" />
              <span *ngIf="!item.imageUrl" class="subtle">Chưa có</span>
            </td>
            <td>{{ item.name }}</td>
            <td>{{ item.category.name }}</td>
            <td>{{ item.unit }}</td>
            <td class="text-right">{{ item.totalQuantity | number }}</td>
            <td class="text-right">
              <div class="action-buttons">
                <button nz-button nzType="text" nzSize="small" aria-label="Sửa" [disabled]="deletingId !== null" (click)="openEditPopup(item)">
                  <span nz-icon nzType="edit"></span>
                  <span>Sửa</span>
                </button>
                <button
                  nz-button
                  nzType="text"
                  nzSize="small"
                  nzDanger
                  aria-label="Xóa"
                  [nzLoading]="deletingId === item.id"
                  [disabled]="deletingId !== null"
                  nz-popconfirm
                  [nzPopconfirmTitle]="'Bạn có chắc muốn xóa thuốc ' + item.name + '?'"
                  nzPopconfirmPlacement="topRight"
                  nzOkText="Xóa"
                  nzCancelText="Hủy"
                  (nzOnConfirm)="deleteMedicine(item)"
                >
                  <span nz-icon nzType="delete"></span>
                  <span>Xóa</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </nz-table>

      <app-pagging [total]="totalItems" [pageIndex]="pageIndex" [pageSize]="pageSize" (pageIndexChange)="onPageChange($event)"></app-pagging>
    </nz-card>
  </main>

  <app-popup-thuoc [open]="isPopupOpen" [editingMedicine]="editingMedicine" (closePopup)="closePopup()" (medicineSaved)="onMedicineSaved($event)"></app-popup-thuoc>
</div>
