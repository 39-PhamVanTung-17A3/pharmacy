<nz-modal
  [nzVisible]="open"
  [nzTitle]="isEditMode ? 'Cập nhật thuốc' : 'Thêm thuốc mới'"
  nzWidth="760"
  nzOkText="Lưu"
  nzCancelText="Hủy"
  [nzOkLoading]="isSubmitting"
  (nzOnCancel)="close()"
  (nzOnOk)="save()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div class="grid-form">
        <nz-form-item class="full-width">
          <nz-form-label [nzRequired]="true">Tên thuốc</nz-form-label>
          <nz-form-control [nzValidateStatus]="form.controls.name">
            <input nz-input formControlName="name" placeholder="Nhập tên thuốc" />
            <div class="field-error" *ngIf="showNameError">{{ nameErrorMessage }}</div>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Danh mục</nz-form-label>
          <nz-form-control [nzValidateStatus]="form.controls.category">
            <nz-select formControlName="category" nzPlaceHolder="Chọn danh mục">
              <nz-option *ngFor="let item of categoryOptions" [nzLabel]="item.name" [nzValue]="item"></nz-option>
            </nz-select>
            <div class="field-error" *ngIf="showCategoryError">Vui lòng chọn danh mục</div>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Đơn vị</nz-form-label>
          <nz-form-control [nzValidateStatus]="form.controls.unit">
            <input nz-input formControlName="unit" placeholder="Nhập đơn vị" />
            <div class="field-error" *ngIf="showUnitError">{{ unitErrorMessage }}</div>
          </nz-form-control>
        </nz-form-item>
      </div>
    </form>
  </ng-container>
</nz-modal>
