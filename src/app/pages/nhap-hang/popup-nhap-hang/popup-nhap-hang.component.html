<nz-modal
  [nzVisible]="open"
  nzTitle="Tạo phiếu nhập"
  nzWidth="760"
  nzOkText="Lưu"
  nzCancelText="Hủy"
  (nzOnCancel)="close()"
  (nzOnOk)="save()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div class="grid-form">
        <nz-form-item class="full-width">
          <nz-form-label [nzRequired]="true">Tên thuốc</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập tên thuốc">
            <input nz-input formControlName="medicineName" placeholder="Nhập tên thuốc" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="full-width">
          <nz-form-label [nzRequired]="true">Nhà cung cấp</nz-form-label>
          <nz-form-control nzErrorTip="Vui lòng nhập nhà cung cấp">
            <input nz-input formControlName="supplier" placeholder="Nhập nhà cung cấp" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Số lượng nhập</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="quantity" [nzMin]="1" [nzStep]="1" class="w-full"></nz-input-number>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Giá nhập</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="importPrice" [nzMin]="0" [nzStep]="1000" class="w-full"></nz-input-number>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Giá bán áp dụng</nz-form-label>
          <nz-form-control>
            <nz-input-number formControlName="sellPrice" [nzMin]="0" [nzStep]="1000" class="w-full"></nz-input-number>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Hạn dùng</nz-form-label>
          <nz-form-control>
            <input nz-input type="date" formControlName="expiryDate" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label [nzRequired]="true">Ngày nhập</nz-form-label>
          <nz-form-control>
            <input nz-input type="date" formControlName="importedAt" />
          </nz-form-control>
        </nz-form-item>
      </div>
    </form>
  </ng-container>
</nz-modal>
