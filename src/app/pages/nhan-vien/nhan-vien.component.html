<div class="page-wrap">
  <app-menu></app-menu>

  <main class="main-content">
    <header class="page-header">
      <nz-breadcrumb>
        <nz-breadcrumb-item>Trang chủ</nz-breadcrumb-item>
        <nz-breadcrumb-item>Nhân viên</nz-breadcrumb-item>
      </nz-breadcrumb>
      <button nz-button nzType="primary" (click)="openCreatePopup()">Thêm nhân viên</button>
    </header>

    <nz-card nzTitle="Danh sách nhân viên" [nzExtra]="extraTpl">
      <ng-template #extraTpl>
        <input nz-input [formControl]="filterForm.controls.keyword"
          placeholder="Tìm kiếm theo tên hoặc số điện thoại" />
      </ng-template>

      <nz-table [nzData]="employeeList" [nzShowPagination]="false" nzSize="middle">
        <thead>
          <tr>
            <th>Tên nhân viên</th>
            <th>Số điện thoại</th>
            <th>Vai trò</th>
            <th>Ca làm</th>
            <th class="text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of employeeList">
            <td>{{ item.name }}</td>
            <td>{{ item.phone }}</td>
            <td>{{ getRoleLabel(item.role) }}</td>
            <td>{{ item.shift }}</td>
            <td class="text-right">
              <div class="action-buttons">
                <button nz-button nzType="text" nzSize="small" aria-label="Sửa" (click)="openEditPopup(item)"
                  [disabled]="deletingId !== null">
                  <span nz-icon nzType="edit"></span>
                  <span>Sửa</span>
                </button>

                <button nz-button nzType="text" nzSize="small" nzDanger aria-label="Xóa"
                  [nzLoading]="deletingId === item.id" [disabled]="deletingId !== null" nz-popconfirm
                  [nzPopconfirmTitle]="'Bạn có chắc muốn xóa nhân viên ' + item.name + '?'"
                  nzPopconfirmPlacement="topRight" nzOkText="Xóa" nzCancelText="Hủy"
                  (nzOnConfirm)="deleteEmployee(item)">
                  <span nz-icon nzType="delete"></span>
                  <span>Xóa</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </nz-table>

      <app-pagging [total]="totalItems" [pageIndex]="pageIndex" [pageSize]="pageSize"
        (pageIndexChange)="onPageChange($event)"></app-pagging>
    </nz-card>
  </main>

  <app-popup-nhan-vien [open]="isPopupOpen" [editingEmployee]="editingEmployee" (closePopup)="closePopup()"
    (employeeSaved)="onEmployeeSaved($event)"></app-popup-nhan-vien>
</div>
