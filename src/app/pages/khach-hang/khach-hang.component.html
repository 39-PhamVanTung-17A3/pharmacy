<div class="page-wrap">
  <app-menu></app-menu>

  <main class="main-content">
    <header class="page-header">
      <nz-breadcrumb>
        <nz-breadcrumb-item>Trang chủ</nz-breadcrumb-item>
        <nz-breadcrumb-item>Khách hàng</nz-breadcrumb-item>
      </nz-breadcrumb>
      <button nz-button nzType="primary" (click)="openCreatePopup()">Thêm khách hàng</button>
    </header>

    <nz-card nzTitle="Danh sách khách hàng" [nzExtra]="extraTpl">
      <ng-template #extraTpl>
        <input nz-input [formControl]="filterForm.controls.keyword"
          placeholder="Tìm kiếm theo tên, số điện thoại hoặc địa chỉ" />
      </ng-template>

      <nz-table [nzData]="customerList" [nzShowPagination]="false" nzSize="middle">
        <thead>
          <tr>
            <th>Tên khách hàng</th>
            <th>Số điện thoại</th>
            <th>Địa chỉ</th>
            <th class="text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of customerList">
            <td>{{ item.name }}</td>
            <td>{{ item.phone }}</td>
            <td>{{ item.address }}</td>
            <td class="text-right">
              <div class="action-buttons">
                <button nz-button nzType="text" nzSize="small" aria-label="Sửa" [disabled]="deletingId !== null"
                  (click)="openEditPopup(item)">
                  <span nz-icon nzType="edit"></span>
                  <span>Sửa</span>
                </button>
                <button nz-button nzType="text" nzSize="small" nzDanger aria-label="Xóa"
                  [nzLoading]="deletingId === item.id" [disabled]="deletingId !== null" nz-popconfirm
                  [nzPopconfirmTitle]="'Bạn có chắc muốn xóa khách hàng ' + item.name + '?'"
                  nzPopconfirmPlacement="topRight" nzOkText="Xóa" nzCancelText="Hủy"
                  (nzOnConfirm)="deleteCustomer(item)">
                  <span nz-icon nzType="delete"></span>
                  <span>Xóa</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </nz-table>

      <app-pagging [total]="totalItems" [pageIndex]="pageIndex" [pageSize]="pageSize"
        (pageIndexChange)="onPageChange($event)"></app-pagging>
    </nz-card>
  </main>

  <app-popup-khach-hang [open]="isPopupOpen" [editingCustomer]="editingCustomer" (closePopup)="closePopup()"
    (customerSaved)="onCustomerSaved($event)"></app-popup-khach-hang>
</div>
