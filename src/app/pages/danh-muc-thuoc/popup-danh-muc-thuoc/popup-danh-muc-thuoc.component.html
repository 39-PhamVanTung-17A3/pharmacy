<nz-modal [nzVisible]="open" [nzTitle]="isEditMode ? 'Sửa danh mục thuốc' : 'Thêm danh mục thuốc'"
  [nzOkText]="isEditMode ? 'Cập nhật' : 'Lưu'" nzCancelText="Hủy" [nzOkLoading]="isSubmitting" (nzOnCancel)="close()"
  (nzOnOk)="save()">
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical" class="popup-form">
      <nz-form-item>
        <nz-form-label [nzRequired]="true">Tên danh mục</nz-form-label>
        <nz-form-control [nzValidateStatus]="form.controls.name" [nzErrorTip]="nameValidError">
          <input nz-input formControlName="name" placeholder="VD: Kháng sinh" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Mô tả ngắn</nz-form-label>
        <nz-form-control [nzValidateStatus]="form.controls.description" [nzErrorTip]="descriptionValidError">
          <textarea nz-input formControlName="description" rows="3" placeholder="Mô tả ngắn cho danh mục"></textarea>
        </nz-form-control>
      </nz-form-item>
    </form>
    <ng-template #nameValidError let-control>
      <ng-container *ngIf="control.errors?.['required']">
        <div>Vui lòng nhập tên danh mục</div>
      </ng-container>
      <ng-container *ngIf="control.errors?.['maxlength']">
        <div>Tên danh mục tối đa 100 ký tự</div>
      </ng-container>
      <ng-container *ngIf="control.errors?.['duplicated']">
        <div>Tên danh mục đã tồn tại</div>
      </ng-container>
    </ng-template>
    <ng-template #descriptionValidError let-control>
      <ng-container *ngIf="control.errors?.['maxlength']">
        <div>Mô tả tối đa 300 ký tự</div>
      </ng-container>
    </ng-template>
  </ng-container>
</nz-modal>
