<div class="page-wrap">
  <app-menu></app-menu>

  <main class="main-content">
    <header class="page-header">
      <nz-breadcrumb>
        <nz-breadcrumb-item>Trang chủ</nz-breadcrumb-item>
        <nz-breadcrumb-item>Danh mục thuốc</nz-breadcrumb-item>
      </nz-breadcrumb>
      <button nz-button nzType="primary" (click)="openCreatePopup()">Thêm danh mục</button>
    </header>

    <nz-card nzTitle="Danh sách danh mục" [nzExtra]="extraTpl">
      <ng-template #extraTpl>
        <input nz-input [formControl]="filterForm.controls.keyword" placeholder="Tìm kiếm danh mục" />
      </ng-template>

      <nz-table [nzData]="categoryList" [nzShowPagination]="false" nzSize="middle">
        <thead>
          <tr>
            <th>Tên danh mục</th>
            <th>Mô tả</th>
            <th class="text-right">Số lượng thuốc</th>
            <th class="text-right">Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of categoryList">
            <td>{{ item.name }}</td>
            <td>{{ item.description }}</td>
            <td class="text-right">{{ item.medicineCount }}</td>
            <td class="text-right">
              <div class="action-buttons">
                <button nz-button nzType="text" nzSize="small" aria-label="Sửa" (click)="openEditPopup(item)">
                  <span nz-icon nzType="edit"></span>
                  <span>Sửa</span>
                </button>
                <button
                  nz-button
                  nzType="text"
                  nzSize="small"
                  nzDanger
                  aria-label="Xóa"
                  [nzLoading]="deletingId === item.id"
                  [disabled]="deletingId !== null"
                  nz-popconfirm
                  [nzPopconfirmTitle]="'Ban co chac muon xoa danh muc ' + item.name + '?'"
                  nzPopconfirmPlacement="topRight"
                  nzOkText="Xoa"
                  nzCancelText="Huy"
                  (nzOnConfirm)="deleteCategory(item)"
                >
                  <span nz-icon nzType="delete"></span>
                  <span>Xóa</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </nz-table>

      <app-pagging
        [total]="totalItems"
        [pageIndex]="pageIndex"
        [pageSize]="pageSize"
        (pageIndexChange)="onPageChange($event)"
      ></app-pagging>
    </nz-card>
  </main>

  <app-popup-danh-muc-thuoc
    [open]="isPopupOpen"
    [editingCategory]="editingCategory"
    (closePopup)="closePopup()"
    (categorySaved)="onCategorySaved($event)"
  ></app-popup-danh-muc-thuoc>
</div>
