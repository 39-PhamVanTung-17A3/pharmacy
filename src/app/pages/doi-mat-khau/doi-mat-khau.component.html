<div class="page-wrap">
  <app-menu></app-menu>

  <main class="main-content">
    <header class="page-header">
      <nz-breadcrumb>
        <nz-breadcrumb-item>Trang chủ</nz-breadcrumb-item>
        <nz-breadcrumb-item>Đổi mật khẩu</nz-breadcrumb-item>
      </nz-breadcrumb>
    </header>

    <nz-card nzTitle="Thông tin đổi mật khẩu" class="card-wrap">
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
        <label>Mật khẩu hiện tại</label>
        <nz-input-group [nzSuffix]="currentPasswordToggleIcon">
          <input nz-input [type]="showCurrentPassword ? 'text' : 'password'" formControlName="currentPassword" placeholder="Nhập mật khẩu hiện tại" />
        </nz-input-group>
        <ng-template #currentPasswordToggleIcon>
          <span nz-icon [nzType]="showCurrentPassword ? 'eye-invisible' : 'eye'" (click)="toggleCurrentPasswordVisibility()"></span>
        </ng-template>

        <label>Mật khẩu mới</label>
        <nz-input-group [nzSuffix]="newPasswordToggleIcon">
          <input nz-input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword" placeholder="Nhập mật khẩu mới" />
        </nz-input-group>
        <ng-template #newPasswordToggleIcon>
          <span nz-icon [nzType]="showNewPassword ? 'eye-invisible' : 'eye'" (click)="toggleNewPasswordVisibility()"></span>
        </ng-template>

        <label>Xác nhận mật khẩu mới</label>
        <nz-input-group [nzSuffix]="confirmPasswordToggleIcon">
          <input nz-input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu mới" />
        </nz-input-group>
        <ng-template #confirmPasswordToggleIcon>
          <span nz-icon [nzType]="showConfirmPassword ? 'eye-invisible' : 'eye'" (click)="toggleConfirmPasswordVisibility()"></span>
        </ng-template>

        <button nz-button nzType="primary" [nzLoading]="loading" [disabled]="loading" class="submit-btn">Cập nhật mật khẩu</button>
      </form>
    </nz-card>
  </main>
</div>
